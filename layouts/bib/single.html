<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BibTeX</title>
  <style>
    body {
      margin: 2rem;
      font-family: sans-serif;
      background: #ffffff;
      color: #111827;
    }
    pre {
      font-family: monospace;
      font-size: 0.88rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      padding: 1rem 1.25rem;
      background: #f6f8fa;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }
    .copy-row {
      margin-top: 0.75rem;
    }
    button {
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #f9fafb;
      color: #374151;
    }
    button:hover {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <pre id="bib">{{ .Params.bib }}</pre>
  <div class="copy-row">
    <button onclick="navigator.clipboard.writeText(document.getElementById('bib').textContent).then(function(){ this.textContent='Copied!'; }.bind(this))">Copy to clipboard</button>
  </div>
</body>
</html>
