<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap');

  html,
  body,
  button,
  input,
  textarea,
  select {
    font-family: 'IBM Plex Sans JP', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
  }

  /* Hide scroll-to-top rocket button */
  [data-scroll-top],
  .scroll-top,
  #scroll-top,
  .back-to-top,
  #back-to-top,
  button[aria-label="Scroll to top"],
  a[aria-label="Scroll to top"],
  button[aria-label="Back to top"],
  a[aria-label="Back to top"] {
    display: none !important;
  }

  /* Social links in bio: force 3 icons per row (3×48px + 2×16px gap = 176px) */
  .flex.flex-wrap.justify-center.gap-4 {
    max-width: 11rem;
    margin-left: auto;
    margin-right: auto;
  }

  /* Flat single-color page background */
  html,
  body,
  main {
    background: #ffffff !important;
    background-image: none !important;
  }

  section,
  .section,
  [class*="gradient"],
  [style*="gradient"] {
    background-image: none !important;
  }

  /* Add breathing room before the site name in the header. */
  @media (min-width: 768px) {
    header a:first-of-type {
      margin-left: 1.5rem;
    }
  }

  html.dark,
  html.dark body,
  html.dark main {
    background: rgb(25, 53, 73) !important;
    background-image: none !important;
  }

  html.dark header {
    background: rgb(15, 34, 48) !important;
    border-color: rgba(255, 255, 255, 0.16) !important;
  }

  html.dark header a,
  html.dark header button,
  html.dark header svg {
    color: #f9fafb !important;
  }

  html.dark header a:hover,
  html.dark header button:hover {
    color: #93c5fd !important;
  }

  html.dark header button {
    background-color: rgba(255, 255, 255, 0.08) !important;
  }

  .compact-publications {
    max-width: 1500px;
    margin-left: auto;
    margin-right: auto;
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .prose:has(.compact-publications),
  .max-w-prose:has(.compact-publications) {
    max-width: min(1500px, calc(100vw - 4rem)) !important;
    width: min(1500px, calc(100vw - 4rem)) !important;
  }

  .compact-publications h3 {
    max-width: 980px;
    margin-top: 1.75rem;
    margin-bottom: 0.75rem;
    margin-left: auto;
    margin-right: auto;
    font-size: 1rem;
    line-height: 1.3;
  }

  .compact-publications p {
    margin-top: 0;
    margin-bottom: 0.35rem;
  }

  .compact-publications article {
    max-width: 980px;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 1.25rem;
  }

  .compact-publications .pub-title {
    margin-bottom: 0.45rem;
  }

  .compact-publications .pub-title strong {
    font-size: 0.95rem;
    line-height: 1.4;
  }

  .compact-publications code {
    font-size: 0.72rem;
    padding: 0.12rem 0.36rem;
  }

  .about-profile {
    width: 100%;
    padding: 2rem 1.5rem 3rem;
  }

  .about-profile__inner {
    display: grid;
    grid-template-columns: minmax(220px, 280px) minmax(0, 760px);
    gap: 3rem;
    max-width: 1100px;
    margin: 0 auto;
    align-items: start;
  }

  .about-profile__sidebar {
    text-align: center;
  }

  .about-profile__avatar {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 9999px;
    margin: 0 auto 1.25rem;
  }

  .about-profile__sidebar h1 {
    margin: 0;
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .about-profile__alternate,
  .about-profile__role,
  .about-profile__affiliation {
    margin: 0.35rem 0;
  }

  .about-profile__links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    margin-top: 1.75rem;
  }

  .about-profile__icon-link {
    width: 3rem;
    height: 3rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 9999px;
    color: #4b5563;
    background: #ffffff;
    border: 1px solid rgba(209, 213, 219, 0.9);
    box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    transition: transform 160ms ease, box-shadow 160ms ease, color 160ms ease;
  }

  .about-profile__icon-link:hover {
    color: #2563eb;
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
  }

  html.dark .about-profile__icon-link {
    color: #d1d5db;
    background: rgba(17, 24, 39, 0.78);
    border-color: rgba(75, 85, 99, 0.9);
  }

  html.dark .about-profile__icon-link:hover {
    color: #60a5fa;
  }

  .about-profile__content {
    display: grid;
    gap: 1.5rem;
  }

  .about-profile__panel h2 {
    margin: 0 0 0.75rem;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.25;
  }

  .about-profile__panel p,
  .about-profile__panel li {
    font-size: 0.98rem;
    line-height: 1.65;
  }

  .about-profile__panel ul {
    margin: 0;
    padding-left: 1.25rem;
  }

  .about-profile__papers article {
    margin-bottom: 1rem;
  }

  .about-profile__papers p {
    margin: 0 0 0.3rem;
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .about-profile__papers .paper-title {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.4;
  }

  html.dark .about-profile__panel,
  html.dark .about-profile__sidebar {
    color: #f9fafb;
  }

  @media (max-width: 767px) {
    .about-profile {
      padding: 1.5rem 1rem 2.5rem;
    }

    .about-profile__inner {
      grid-template-columns: 1fr;
      gap: 2rem;
    }
  }

  .cv-page-marker {
    display: none;
  }

  body:has(.cv-page-marker) .article-metadata,
  body:has(.cv-page-marker) .page-metadata,
  body:has(.cv-page-marker) [class*="reading"],
  body:has(.cv-page-marker) [class*="Reading"] {
    display: none !important;
  }

  body:has(.cv-page-marker) main h1 {
    display: none !important;
  }

  body:has(.cv-page-marker) .prose {
    font-size: 0.88rem !important;
    line-height: 1.55 !important;
  }

  body:has(.cv-page-marker) .prose h2 {
    font-size: 1rem !important;
    line-height: 1.3 !important;
    margin-top: 1.75rem !important;
    margin-bottom: 0.75rem !important;
  }

  body:has(.cv-page-marker) .prose p,
  body:has(.cv-page-marker) .prose li {
    font-size: 0.88rem !important;
    line-height: 1.55 !important;
  }
</style>
