role: Ph.D. Student in Robotics
bio: |
  I am a Ph.D. student at the University of Tokyo, conducting research in robotics. My research interests include camera-based localization, visual odometry, and SLAM, with a particular focus on robust localization methods using 360-degree cameras and deep learning. I aim to develop visual perception technologies that enable robots to reliably understand their surroundings and navigate autonomously in real-world environments.

