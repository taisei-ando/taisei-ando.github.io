bio: |
  東京大学大学院の博士課程で、カメラ画像を用いた自己位置推定を中心として、視覚を通じた環境理解に取り組んでいます。複雑な実環境でもロボットが周囲を安定して理解し、自律的に移動できるような視覚認識システムの実現を目指しています。

