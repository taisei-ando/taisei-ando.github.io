bio: |
  東京大学大学院の博士課程でロボティクスを研究しています。特に、カメラ画像を用いた自己位置推定や視覚オドメトリ、SLAMに関心があり、360度カメラや深層学習を活用した頑健な自己位置推定手法の研究に取り組んでいます。実環境で動作するロボットが周囲を安定して理解し、自律的に移動できるようにするための視覚認識技術の実現を目指しています。

