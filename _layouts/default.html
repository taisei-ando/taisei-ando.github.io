<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&amp;family=Source+Sans+3:wght@400;600;700&amp;family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&amp;display=swap" rel="stylesheet" />
    <script>
      (function () {
        var storedTheme = null;
        try {
          storedTheme = localStorage.getItem("theme");
        } catch (error) {}
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", storedTheme || (prefersDark ? "dark" : "light"));
      })();
    </script>
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container nav-container">
        <header class="masthead clearfix">
          <a class="masthead-name" href="{{ site.baseurl }}{% if page.lang == 'ja' %}/ja/{% else %}/{% endif %}">{{ site.name }}</a>

          <nav>
            {% if page.lang == "ja" %}
              <a href="{{ site.baseurl }}/ja/">プロフィール</a>
              <a href="{{ site.baseurl }}/ja/publications/">業績</a>
              <a href="{{ site.baseurl }}/ja/cv/">CV</a>
            {% else %}
              <a href="{{ site.baseurl }}/">About</a>
              <a href="{{ site.baseurl }}/publications/">Publications</a>
              <a href="{{ site.baseurl }}/cv/">CV</a>
            {% endif %}
          </nav>

          <div class="nav-actions" aria-label="Display and language controls">
            <button class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
              <span class="theme-icon theme-icon--moon" aria-hidden="true">☾</span>
              <span class="theme-icon theme-icon--sun" aria-hidden="true">☀</span>
            </button>
            {% if page.lang == "ja" %}
              <a class="language-switch" href="{{ site.baseurl }}{{ page.alternate_url | default: '/' }}" aria-label="Switch to English">EN</a>
            {% else %}
              <a class="language-switch" href="{{ site.baseurl }}{{ page.alternate_url | default: '/ja/' }}" aria-label="Switch to Japanese">JA</a>
            {% endif %}
          </div>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          <p>
            This template is from
            <a href="https://github.com/barryclark/jekyll-now">here</a>.
            Modified by Taisei Ando in 2026.
          </p>
        </footer>
      </div>
    </div>

    {% include analytics.html %}
    <script>
      (function () {
        var root = document.documentElement;
        var toggle = document.querySelector(".theme-toggle");
        var storedTheme = null;
        try {
          storedTheme = localStorage.getItem("theme");
        } catch (error) {}
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = storedTheme || (prefersDark ? "dark" : "light");

        function applyTheme(nextTheme) {
          root.setAttribute("data-theme", nextTheme);
          if (toggle) {
            toggle.setAttribute("aria-pressed", nextTheme === "dark");
          }
        }

        applyTheme(theme);

        if (toggle) {
          toggle.addEventListener("click", function () {
            theme = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
            try {
              localStorage.setItem("theme", theme);
            } catch (error) {}
            applyTheme(theme);
          });
        }
      })();
    </script>
  </body>
</html>
